# Підключати після certbot: -f docker-compose.ssl.yml
# deploy/scripts/setup-ssl.sh робить це автоматично
services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot_www:/var/www/certbot:ro
