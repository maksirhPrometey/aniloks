{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#003D82">
  <meta name="htmx-config" content='{"headMergeStyle":"none"}'>
  <title>{% block title %}Обладнання для Друку{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Постачання обладнання та комплектуючих для поліграфічної та пакувальної промисловості України. Вали тиснення, анілоксові вали, флексографічне обладнання.{% endblock %}">

  <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{% static 'favicon.svg' %}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/reset.css' %}">
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/typography.css' %}">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout/header.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout/footer.css' %}">
  <link rel="stylesheet" href="{% static 'css/layout/grid.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/button.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/card.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/form.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/nav-mobile.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/lightbox.css' %}">
  {% block extra_css %}{% endblock %}

  <script src="{% static 'django_htmx/htmx.min.js' %}" defer></script>
</head>
<body class="{% block body_class %}{% endblock %}">

  <a href="#main-content" class="skip-link">Перейти до основного вмісту</a>

  {% include 'partials/header.html' %}

  <div id="mobile-nav-root"></div>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <script type="module" src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
